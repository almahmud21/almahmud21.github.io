{{ define "main" }}
<main class="container py-4">
    {{/* Page Title and Content */}}
    <div class="text-center mb-5">
        <h6>{{ .Title }}</h6>
        <div class="lead">{{ .Content }}</div>
    </div>

    {{/* Call the partial template to ensure the correct icon is used */}}
    {{ partial "project-gallery.html" . }}
</main>
{{ end }}
